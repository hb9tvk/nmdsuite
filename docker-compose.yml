services:
  nmdsuite:
    image: ghcr.io/hb9tvk/nmdsuite:latest
    container_name: nmdsuite
    pull_policy: always
    ports:
      - 127.0.0.1:5005:5005
    networks:
      - nginxproxy_default
      - postfix_default
    env_file:
      - .env
    environment:
      NMD_DB_PATH: /data/nmdsuite.sqlite3
      # Reverse-proxy mount point. Strip-and-forward style: the proxy
      # serves /nmdsuite/* and passes the unprefixed path to the
      # container, so Django needs SCRIPT_NAME to know its mount.
      DJANGO_SCRIPT_NAME: /nmdsuite
      DJANGO_CSRF_TRUSTED_ORIGINS: https://nmd.uska.ch
      NMD_BASE_URL: https://nmd.uska.ch/nmdsuite
    volumes:
      - ./data:/data
    restart: unless-stopped

networks:
  nginxproxy_default:
    external: true
  postfix_default:
    external: true
